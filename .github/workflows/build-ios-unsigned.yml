name: Build unsigned iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.actor == github.repository_owner
    runs-on: macos-latest
    env:
      APP_VERSION: "1.9"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate native Xcode project
        working-directory: native-ios
        run: xcodegen generate

      - name: Build unsigned iOS app
        run: |
          set -euo pipefail
          xcodebuild \
            -project native-ios/AudioRecorder.xcodeproj \
            -scheme AudioRecorder \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            MARKETING_VERSION=${APP_VERSION} \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/ios -path '*Release-iphoneos/*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi
          if [ ! -f "$APP_PATH/Info.plist" ]; then
            echo "App bundle missing Info.plist"
            find "$APP_PATH" -maxdepth 2 -type f | sort
            exit 1
          fi
          mkdir -p unsigned-ipa/Payload
          cp -R "$APP_PATH" "unsigned-ipa/Payload/$(basename "$APP_PATH")"
          VERSIONED_IPA="AudioRecorder-iPhone-v${APP_VERSION}-build-${GITHUB_RUN_NUMBER}.ipa"
          LATEST_VERSIONED_IPA="AudioRecorder-iPhone-latest-v${APP_VERSION}-build-${GITHUB_RUN_NUMBER}.ipa"
          (cd unsigned-ipa && zip -qry "../${VERSIONED_IPA}" Payload)
          cp "${VERSIONED_IPA}" AudioRecorder-unsigned.ipa
          cp "${VERSIONED_IPA}" "${LATEST_VERSIONED_IPA}"
          ls -lh "${VERSIONED_IPA}" "${LATEST_VERSIONED_IPA}" AudioRecorder-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioRecorder-unsigned-ipa
          path: AudioRecorder-unsigned.ipa
          retention-days: 3

      - name: Publish latest IPA release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSIONED_IPA="AudioRecorder-iPhone-v${APP_VERSION}-build-${GITHUB_RUN_NUMBER}.ipa"
          LATEST_VERSIONED_IPA="AudioRecorder-iPhone-latest-v${APP_VERSION}-build-${GITHUB_RUN_NUMBER}.ipa"
          cp AudioRecorder-unsigned.ipa "${VERSIONED_IPA}"
          cp AudioRecorder-unsigned.ipa "${LATEST_VERSIONED_IPA}"
          cp AudioRecorder-unsigned.ipa AudioRecorder-iPhone-latest.ipa
          if gh release view latest-ipa >/dev/null 2>&1; then
            gh release upload latest-ipa AudioRecorder-iPhone-latest.ipa "${LATEST_VERSIONED_IPA}" "${VERSIONED_IPA}" --clobber
          else
            gh release create latest-ipa AudioRecorder-iPhone-latest.ipa "${LATEST_VERSIONED_IPA}" "${VERSIONED_IPA}" \
              --title "Latest unsigned iOS IPA" \
              --notes "Latest unsigned IPA built from ${GITHUB_SHA}." \
              --latest
          fi
