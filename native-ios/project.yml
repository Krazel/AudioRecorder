name: AudioRecorder
options:
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
targets:
  AudioRecorder:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources
      - path: Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - AudioRecorderApp.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dmkr.audio
        PRODUCT_NAME: Grabadora
        MARKETING_VERSION: "1.8"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/AudioRecorderApp.entitlements
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
